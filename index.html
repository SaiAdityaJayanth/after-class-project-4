<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Familiar with Tables</title>
</head>
<body>

    <h1>Get Familiar with Tables</h1>

    <table border="1">
        <caption>Student Marks Table</caption>
        <thead>
            <tr>
                <th>Roll No</th>
                <th>Name</th>
                <th>Subject</th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>101</td>
                <td>Alice</td>
                <td>Math</td>
                <td>88</td>
            </tr>
            <tr>
                <td>102</td>
                <td>Bob</td>
                <td>Science</td>
                <td>92</td>
            </tr>
            <tr>
                <td>103</td>
                <td>Charlie</td>
                <td>English</td>
                <td>85</td>
            </tr>
            <tr>
                <td>104</td>
                <td>Diana</td>
                <td>History</td>
                <td>90</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
